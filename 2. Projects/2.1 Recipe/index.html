    <!--
    ╔══════════════════════════════════════════════════════════════════╗
    ║  PROJECT 2.1 — RECIPE WEBSITE                                    ║
    ║  Lecture Notes: 04. HTML Foundations                             ║
    ╚══════════════════════════════════════════════════════════════════╝

    WHAT YOU'RE BUILDING:
    ─────────────────────
    A simple multi-page recipe website using only HTML — no CSS or
    JavaScript yet. The goal is to practise the fundamental HTML
    elements and understand how pages link to each other.

    This page is the homepage (index.html). It lists your recipes
    and links to individual recipe pages in the /recipes/ folder.

    There are 3 recipe pages already created for you:
      recipes/lasagna.html
      recipes/tacos.html
      recipes/chocolate-chip-cookies.html

    You can replace those recipes with your own favourites —
    the content doesn't matter, the structure does.


    ══════════════════════════════════════════════════════════════════
    TASK 1 — PAGE TITLE
    ══════════════════════════════════════════════════════════════════
    Add a <title> element inside <head>:
      <title>My Recipe Collection</title>
    This shows in the browser tab — not on the page itself.


    ══════════════════════════════════════════════════════════════════
    TASK 2 — SITE HEADER
    ══════════════════════════════════════════════════════════════════
    Inside <body>, add a <header> element containing:
      • An <h1> with your site name (e.g. "My Recipe Collection")
      • A <p> with a short description of the site


    ══════════════════════════════════════════════════════════════════
    TASK 3 — NAVIGATION
    ══════════════════════════════════════════════════════════════════
    Add a <nav> element after the header. Inside it, put an unordered
    list <ul> of links to your recipe pages:

      <ul>
        <li><a href="recipes/lasagna.html">Lasagna</a></li>
        <li><a href="recipes/tacos.html">Tacos</a></li>
        <li><a href="recipes/chocolate-chip-cookies.html">Chocolate Chip Cookies</a></li>
      </ul>

    The href path is relative — "recipes/lasagna.html" means
    "look inside the recipes folder for lasagna.html".


    ══════════════════════════════════════════════════════════════════
    TASK 4 — MAIN CONTENT
    ══════════════════════════════════════════════════════════════════
    Wrap your main content in a <main> element. Inside it:
      • An <h2> heading like "Featured Recipes"
      • A short paragraph describing what kind of recipes you have


    ══════════════════════════════════════════════════════════════════
    TASK 5 — FOOTER
    ══════════════════════════════════════════════════════════════════
    Add a <footer> at the bottom of the page with:
      • A copyright line: <p>&copy; 2025 Your Name</p>
      (&copy; is the HTML entity for the © symbol)


    ══════════════════════════════════════════════════════════════════
    STRETCH GOALS
    ══════════════════════════════════════════════════════════════════
    → Add a 4th recipe of your own choice
    → Add an <img> to the homepage (a food photo from Unsplash)
    → Add a short description under each link in the nav list
    -->

  </head>

</html>
