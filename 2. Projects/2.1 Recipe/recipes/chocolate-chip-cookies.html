    INGREDIENTS (suggested):
      • 280g (2 1/4 cups) all-purpose flour
      • 1 tsp baking soda
      • 1 tsp salt
      • 225g (1 cup / 2 sticks) unsalted butter, softened
      • 150g (3/4 cup) granulated sugar
      • 165g (3/4 cup packed) brown sugar
      • 2 large eggs
      • 2 tsp vanilla extract
      • 340g (2 cups) chocolate chips

    STEPS (suggested):
      1. Preheat oven to 190°C (375°F). Line baking sheets with parchment.
      2. Whisk flour, baking soda, and salt in a bowl; set aside.
      3. Beat butter and both sugars until light and fluffy, about 3 mins.
      4. Add eggs one at a time, beating well. Mix in vanilla.
      5. Stir in flour mixture until just combined. Fold in chocolate chips.
      6. Drop rounded tablespoons of dough onto sheets, 5cm apart.
      7. Bake 9–11 mins until edges are golden (centres will look underdone).
      8. Cool on sheet 5 mins, then transfer to a wire rack.
