    WHAT YOU'RE BUILDING:

    An individual recipe page. This is one of three example recipe
    pages. Each one should follow the same structure.

    You're welcome to change the recipe to something you actually like
    cooking. The content is just a starting point.


    ══════════════════════════════════════════════════════════════════
    TASK 1 — PAGE TITLE AND BACK LINK
    ══════════════════════════════════════════════════════════════════
    In <head>: <title>Lasagna — My Recipe Collection</title>

    In <body>, the first element should be a link back to the homepage:
      <a href="../index.html">← Back to all recipes</a>

    The "../" means "go up one folder level" — from /recipes/ back
    to the root where index.html lives.


    ══════════════════════════════════════════════════════════════════
    TASK 2 — RECIPE TITLE
    ══════════════════════════════════════════════════════════════════
    Add an <h1> with the recipe name. There should only be ONE <h1>
    per page — it represents the main topic of the page.

      <h1>Classic Lasagna</h1>


    ══════════════════════════════════════════════════════════════════
    TASK 3 — RECIPE IMAGE
    ══════════════════════════════════════════════════════════════════
    Add an image of the dish:
      <img src="https://images.unsplash.com/photo-1574894709920-11b28e7367e3?w=800"
           alt="Classic lasagna in a baking dish"
           width="500" />

    The "alt" attribute is required and describes the image for:
      • Screen readers (accessibility)
      • When the image fails to load
      • Search engines

    The width and height attributes prevent "layout shift" — the page
    jumping around when the image loads.


    ══════════════════════════════════════════════════════════════════
    TASK 4 — DESCRIPTION
    ══════════════════════════════════════════════════════════════════
    Add an <h2> heading called "Description" followed by one or two
    <p> (paragraph) elements describing the dish. Write in your own
    words — what does it taste like? When would you make it?

    This teaches you when to use <p> vs. when to use headings.
    Headings (<h1>–<h6>) mark sections. <p> is for regular text.


    ══════════════════════════════════════════════════════════════════
    TASK 5 — INGREDIENTS
    ══════════════════════════════════════════════════════════════════
    Add an <h2> heading called "Ingredients" followed by an
    UNORDERED list <ul> of ingredients:

      <ul>
        <li>12 lasagna noodles</li>
        <li>1 lb ground beef</li>
        ...
      </ul>

    Unordered lists use bullet points — correct for ingredients
    because the order doesn't matter.

    Suggested ingredients for this recipe:
      • 12 lasagna noodles
      • 1 lb (450g) ground beef
      • 1 jar (680g) marinara sauce
      • 500g ricotta cheese
      • 2 cups shredded mozzarella
      • 1/2 cup grated Parmesan
      • 1 egg
      • 2 cloves garlic, minced
      • 1 tsp Italian seasoning
      • Salt and pepper to taste


    ══════════════════════════════════════════════════════════════════
    TASK 6 — STEPS
    ══════════════════════════════════════════════════════════════════
    Add an <h2> heading called "Steps" followed by an ORDERED list
    <ol> of instructions:

      <ol>
        <li>Preheat oven to 190°C (375°F).</li>
        <li>...</li>
      </ol>

    Ordered lists use numbers — correct for instructions where
    the sequence matters.

    Suggested steps:
      1. Preheat oven to 190°C (375°F)
      2. Cook noodles per package instructions; drain and set aside
      3. Brown the beef with garlic; drain fat; stir in sauce; simmer 10 mins
      4. Mix ricotta, egg, half the mozzarella, half the Parmesan; season
      5. Spread a thin layer of sauce in a 23×33cm baking dish
      6. Layer: 3 noodles, 1/3 ricotta mixture, 1/3 sauce. Repeat x3
      7. Top with remaining mozzarella and Parmesan
      8. Cover with foil; bake 25 mins; remove foil; bake 20 more mins
      9. Rest 15 minutes before slicing
