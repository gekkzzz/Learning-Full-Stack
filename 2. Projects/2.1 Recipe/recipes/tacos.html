    INGREDIENTS (suggested):
      • 450g (1 lb) ground beef
      • 1 packet taco seasoning
      • 1/3 cup water
      • 8 small corn or flour tortillas
      • 1 cup shredded cheddar cheese
      • 1 cup shredded lettuce
      • 1/2 cup diced tomatoes
      • 1/2 cup sour cream
      • 1/4 cup salsa
      • 1 lime, cut into wedges

    STEPS (suggested):
      1. Heat skillet over medium-high. Brown beef, breaking apart, ~7 mins. Drain fat.
      2. Stir in taco seasoning and water. Simmer 3–4 mins until thickened.
      3. Warm tortillas in a dry skillet 30 secs per side.
      4. Spoon beef into tortillas.
      5. Add toppings: cheese, lettuce, tomatoes, sour cream, salsa.
      6. Squeeze lime juice over and serve.
